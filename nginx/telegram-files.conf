# Serves the Telegram Bot API server working directory over HTTP.
#
# URLs are path-based and contain NO bot token, e.g.
#   http://files-host/<bot_id>/documents/file_5.jpg
#
# The volume is mounted read-only (see docker-compose.nginx.yml).

server {
    listen 80;
    server_name _;

    # Large files: don't buffer, allow big responses, generous timeouts.
    sendfile on;
    tcp_nopush on;
    client_max_body_size 0;

    # --- file downloads --------------------------------------------------
    location / {
        root /var/lib/telegram-bot-api;
        autoindex off;
        # nginx serves Range requests natively → resumable multi-GB downloads.

        # --- OPTIONAL hardening (off by default) ---------------------------
        # The user opted out of signed URLs. If you want access control, pick one:
        #
        # 1) HTTP basic auth:
        #   auth_basic "files";
        #   auth_basic_user_file /etc/nginx/.htpasswd;
        #
        # 2) IP allow-list:
        #   allow 10.0.0.0/8;
        #   deny all;
        #
        # 3) nginx secure_link (HMAC, still token-less): see the docs guide.
    }

    # --- OPTIONAL: also reverse-proxy the Bot API on the same host ---------
    # Use the docker SERVICE name (not a host IP) — see aiogram/telegram-bot-api#10.
    #
    # location /bot {
    #     proxy_pass http://telegram-bot-api:8081;
    #     proxy_set_header Host $host;
    # }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        default_type text/plain;
    }
}
