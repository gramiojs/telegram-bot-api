name: build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "tdlib/telegram-bot-api ref to build (default: master)"
        required: false
        default: master
  push:
    branches: [main]
    paths:
      - Dockerfile
      - docker-entrypoint.sh
      - .github/workflows/build.yml
  repository_dispatch:
    types: [upstream-update]
  schedule:
    - cron: "0 6 * * 1" # weekly safety net

permissions:
  contents: read
  packages: write
  id-token: write # cosign keyless signing

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/telegram-bot-api
  DOCKERHUB_IMAGE: gramiojs/telegram-bot-api
  # mapped to env so step-level `if:` can gate on it (the `secrets` context is not available in `if`)
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.r.outputs.ref }}
      sha: ${{ steps.r.outputs.sha }}
      short: ${{ steps.r.outputs.short }}
    steps:
      - id: r
        run: |
          REF="${{ github.event.inputs.ref || github.event.client_payload.ref || 'master' }}"
          SHA=$(git ls-remote https://github.com/tdlib/telegram-bot-api.git "$REF" | cut -f1)
          [ -z "$SHA" ] && SHA="$REF"
          echo "ref=$REF"            >> "$GITHUB_OUTPUT"
          echo "sha=$SHA"            >> "$GITHUB_OUTPUT"
          echo "short=${SHA:0:12}"   >> "$GITHUB_OUTPUT"
          echo "Building tdlib/telegram-bot-api @ $REF ($SHA)"

  build:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        target: [alpine]
        platform: [linux/amd64, linux/arm64]
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          build-args: |
            TELEGRAM_BOT_API_REF=${{ needs.resolve.outputs.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.resolve.outputs.sha }}
            org.opencontainers.image.description=Telegram Bot API server, built by GramIO
            org.opencontainers.image.licenses=BSL-1.0
          cache-from: type=gha,scope=${{ matrix.target }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}-${{ matrix.platform }}
          provenance: true
          sbom: true
          outputs: |
            type=image,name=${{ env.GHCR_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          digest="${{ steps.build.outputs.digest }}"
          mkdir -p "/tmp/digests/${{ matrix.target }}"
          touch "/tmp/digests/${{ matrix.target }}/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.target }}-${{ strategy.job-index }}
          path: /tmp/digests/*
          retention-days: 1

  # Build each target for the host arch and actually run the compiled binary.
  # Proves the compiled binary links and executes before publishing.
  smoke:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [alpine]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (load) ${{ matrix.target }}
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          load: true
          tags: tbapi-smoke:${{ matrix.target }}
          build-args: |
            TELEGRAM_BOT_API_REF=${{ needs.resolve.outputs.sha }}
          cache-from: type=gha,scope=${{ matrix.target }}-linux/amd64
      - name: Run the binary
        run: |
          set -eu
          out=$(docker run --rm --entrypoint /usr/local/bin/telegram-bot-api \
            tbapi-smoke:${{ matrix.target }} --help 2>&1 || true)
          echo "$out" | head -30
          echo "$out" | grep -qi "api-id" \
            || { echo "::error::binary did not print expected --help output"; exit 1; }

  merge:
    needs: [resolve, build, smoke]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [alpine]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: digests-${{ matrix.target }}-*
          path: /tmp/digests
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          SHORT="${{ needs.resolve.outputs.short }}"
          echo "tags=latest alpine sha-$SHORT" >> "$GITHUB_OUTPUT"

      - name: Create and push manifest lists
        working-directory: /tmp/digests/${{ matrix.target }}
        run: |
          set -eu
          for IMAGE in "${GHCR_IMAGE}" "${DOCKERHUB_IMAGE}"; do
            # skip Docker Hub if not configured
            if [ "$IMAGE" = "${DOCKERHUB_IMAGE}" ] && [ -z "$DOCKERHUB_TOKEN" ]; then
              continue
            fi
            TAG_ARGS=""
            for T in ${{ steps.tags.outputs.tags }}; do
              TAG_ARGS="$TAG_ARGS -t ${IMAGE}:${T}"
            done
            # shellcheck disable=SC2046
            docker buildx imagetools create $TAG_ARGS \
              $(printf "${GHCR_IMAGE}@sha256:%s " *)
          done

      - name: Sign with cosign
        uses: sigstore/cosign-installer@v3
      - run: |
          set -eu
          for T in ${{ steps.tags.outputs.tags }}; do
            cosign sign --yes "${GHCR_IMAGE}:${T}" || true
          done
